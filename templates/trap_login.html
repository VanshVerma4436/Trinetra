<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinetra - Secure Access</title>
    <style>
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-blue: #00f3ff;
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.5);
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0, 243, 255, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(0, 243, 255, 0.05) 0%, transparent 20%);
            color: var(--text-main);
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Subtle Grid Animation */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
            z-index: -1;
            transform: rotate(45deg);
        }

        @keyframes moveGrid {
            0% {
                transform: translateY(0) rotate(45deg);
            }

            100% {
                transform: translateY(-50px) rotate(45deg);
            }
        }

        .login-container {
            position: relative;
            width: 400px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            overflow: hidden;
        }

        .login-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
        }

        h1 {
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 24px;
        }

        .logo-mark {
            color: var(--neon-blue);
            text-shadow: var(--neon-glow);
            font-weight: 700;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-size: 10px;
            border-radius: 20px;
            letter-spacing: 1px;
            margin-bottom: 30px;
            box-shadow: var(--neon-glow);
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--neon-blue);
            box-shadow: var(--neon-glow);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #007acc, #00f3ff);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 800;
            cursor: pointer;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
        }

        .disclaimer {
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-dim);
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h1>Tri<span class="logo-mark">netra</span></h1>
        <div class="badge">SECURE GATEWAY v3.0</div>

        <!-- Trap Form: Logs data but never authenticates -->
        <form method="POST">
            {% csrf_token %}
            <!-- Hidden field to identify trap traffic -->
            <input type="hidden" name="is_trap" value="true">

            <div class="input-group">
                <input type="text" name="username" placeholder="Officer ID / Badge #" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Access Code" required autocomplete="off">
            </div>
            <button type="submit">Authenticate</button>
        </form>

        <p class="disclaimer">
            WARNING: Unauthorized access is a felony.<br>
            All attempts are monitored and logged.
        </p>
    </div>

</body>

</html>
