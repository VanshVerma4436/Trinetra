<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trinetra Officer Portal{% endblock %}</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-deep: #020204;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-green: #0aff0a;
            --glass-bg: rgba(10, 15, 20, 0.85);
            --glass-border: rgba(0, 243, 255, 0.2);
            --text-main: #f0f6fc;
            --text-muted: #6e8496;
            --font-ui: 'Rajdhani', sans-serif;
            --font-hud: 'Orbitron', sans-serif;
            --font-code: 'Share Tech Mono', monospace;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-ui);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image:
                linear-gradient(rgba(0, 20, 40, 0.8), rgba(5, 5, 5, 0.95)),
                repeating-linear-gradient(0deg, transparent 0, transparent 40px, rgba(0, 243, 255, 0.03) 41px),
                repeating-linear-gradient(90deg, transparent 0, transparent 40px, rgba(0, 243, 255, 0.03) 41px);
        }

        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 1000;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Top Bar */
        .top-bar {
            height: 70px;
            background: linear-gradient(90deg, rgba(8, 12, 18, 0.95), rgba(15, 20, 30, 0.9));
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            backdrop-filter: blur(20px);
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            background: var(--neon-blue);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .brand {
            font-family: var(--font-hud);
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--neon-blue);
            text-transform: uppercase;
            text-decoration: none;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .user-info {
            font-family: var(--font-code);
            font-size: 14px;
            color: var(--text-main);
        }

        .btn-logout {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-logout:hover {
            color: var(--neon-blue);
        }

        /* Main Container */
        .main-container {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Utility Classes */
        .btn-neon {
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-blue);
            padding: 15px 40px;
            border: 1px solid var(--neon-blue);
            border-radius: 2px;
            font-family: var(--font-hud);
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .btn-neon:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>
    <div class="top-bar">
        <div class="brand-container">
            <div class="brand-logo">T</div>
            <a href="{% url 'officer_dashboard' %}" class="brand">TRINETRA SECURE PORTAL</a>
        </div>
        <div class="nav-links">
            <div class="user-info">Welcome, {{ user.username }}</div>
            <a href="{% url 'officer_logout' %}" class="btn-logout">Logout</a>
        </div>
    </div>

    <div class="main-container">
        {% block content %}{% endblock %}
    </div>

    {% block extra_js %}{% endblock %}
</body>

</html>
