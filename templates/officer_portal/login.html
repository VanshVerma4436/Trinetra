{% extends 'officer_portal/base.html' %}

{% block title %}Trinetra - Officer Access{% endblock %}

{% block content %}
<style>
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 80vh;
    }

    .login-box {
        background: rgba(10, 12, 16, 0.8);
        border: 1px solid var(--neon-blue);
        border-radius: 4px;
        padding: 40px;
        width: 400px;
        position: relative;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(50px) scale(0.9);
        }

        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    /* Corners */
    .corner {
        position: absolute;
        width: 20px;
        height: 20px;
        border-color: var(--neon-blue);
        border-style: solid;
        pointer-events: none;
    }

    .tl {
        top: -1px;
        left: -1px;
        border-width: 2px 0 0 2px;
    }

    .tr {
        top: -1px;
        right: -1px;
        border-width: 2px 2px 0 0;
    }

    .bl {
        bottom: -1px;
        left: -1px;
        border-width: 0 0 2px 2px;
    }

    .br {
        bottom: -1px;
        right: -1px;
        border-width: 0 2px 2px 0;
    }

    .box-title {
        font-family: var(--font-hud);
        font-size: 24px;
        color: white;
        text-align: center;
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        color: var(--neon-blue);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 5px;
        display: block;
    }

    .form-input {
        width: 100%;
        padding: 12px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid #333;
        color: white;
        font-family: var(--font-code);
        transition: 0.3s;
        outline: none;
    }

    .form-input:focus {
        border-color: var(--neon-blue);
        background: rgba(0, 243, 255, 0.05);
        box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
    }

    .btn-login {
        width: 100%;
        background: var(--neon-blue);
        color: black;
        border: none;
        padding: 15px;
        font-family: var(--font-hud);
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-login:hover {
        box-shadow: 0 0 30px var(--neon-blue);
        transform: scale(1.02);
    }
</style>

<div class="login-container">
    <div class="login-box">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div class="box-title">Officer Access</div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Officer ID</label>
                <input type="text" name="username" class="form-input" placeholder="OFF-XXXX-XX" autocomplete="off">
            </div>

            <div class="form-group">
                <label class="form-label">Secure Passcode</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login">Authenticate</button>

            <div style="text-align: center; margin-top: 15px;">
                <button type="button" class="btn-neon" onclick="startBiometricLogin()"
                    style="font-size: 14px; padding: 10px 20px;">
                    Login with Biometrics
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    async function startBiometricLogin() {
        // Simple username check if needed, or rely on resident keys
        const usernameInput = document.querySelector('input[name="username"]');
        const username = usernameInput ? usernameInput.value : '';
        
        // Get CSRF Token
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        try {
            // 1. Get Options
            const resp = await fetch('/auth/api/biometric/options/', {
                method: 'POST',
                body: JSON.stringify({ username: username }),
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                }
            });
            const options = await resp.json();

            // Format challenge
            options.challenge = Uint8Array.from(atob(options.challenge), c => c.charCodeAt(0));
            options.allowCredentials.forEach(cred => {
                cred.id = Uint8Array.from(atob(cred.id), c => c.charCodeAt(0));
            });

            // 2. Browser Prompt
            const credential = await navigator.credentials.get({ publicKey: options });

            // 3. Verify
            const attestation = {
                id: credential.id,
                response: {
                    clientDataJSON: arrayBufferToBase64(credential.response.clientDataJSON),
                    authenticatorData: arrayBufferToBase64(credential.response.authenticatorData),
                    signature: arrayBufferToBase64(credential.response.signature),
                    userHandle: credential.response.userHandle ? arrayBufferToBase64(credential.response.userHandle) : null
                }
            };

            const verifyResp = await fetch('/auth/api/biometric/verify/', {
                method: 'POST',
                body: JSON.stringify(attestation),
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                }
            });

            const result = await verifyResp.json();
            if (result.status === 'ok') {
                window.location.href = result.redirect_url;
            } else {
                alert('Authentication Failed: ' + result.error);
            }

        } catch (e) {
            console.error(e);
            alert('Biometric Login Error. See console.');
        }
    }

    function arrayBufferToBase64(buffer) {
        let binary = '';
        const bytes = new Uint8Array(buffer);
        const len = bytes.byteLength;
        for (let i = 0; i < len; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return window.btoa(binary);
    }
</script>
{% endblock %}
